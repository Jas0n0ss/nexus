name: Build Check — PR Validation

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

env:
  FLUTTER_VERSION: '3.22.0'
  SING_BOX_VERSION: '1.9.3'

jobs:
# ─── Fast checks (run first, cheapest) ───────────────────────────────────────
  lint:
    name: Lint & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '${{ env.FLUTTER_VERSION }}', cache: true }
      - run: flutter pub get
        working-directory: app
      - run: flutter analyze --no-pub
        working-directory: app
      - run: dart format --set-exit-if-changed lib/
        working-directory: app

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '${{ env.FLUTTER_VERSION }}', cache: true }
      - run: flutter pub get
        working-directory: app
      - run: flutter test --coverage
        working-directory: app
      - uses: codecov/codecov-action@v4
        with: { files: app/coverage/lcov.info, flags: flutter }

# ─── Platform build checks (no packaging, just verify compilation) ────────────
  check-android:
    name: Android Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '${{ env.FLUTTER_VERSION }}', cache: true }
      - run: flutter pub get
        working-directory: app
      - name: Create stub sing-box assets
        run: |
          mkdir -p app/android/app/src/main/assets/cores
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            echo "stub" > "app/android/app/src/main/assets/cores/sing-box-${ABI}"
          done
      - run: flutter build apk --debug
        working-directory: app

  check-linux:
    name: Linux Build Check
    runs-on: ubuntu-22.04
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '${{ env.FLUTTER_VERSION }}', cache: true }
      - run: flutter pub get
        working-directory: app
      - run: flutter build linux --debug
        working-directory: app

  check-windows:
    name: Windows Build Check
    runs-on: windows-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '${{ env.FLUTTER_VERSION }}', cache: true }
      - run: flutter pub get
        working-directory: app
      - name: Create stub binaries
        shell: pwsh
        run: |
          "stub" | Out-File -FilePath app/windows/runner/sing-box.exe
          "stub" | Out-File -FilePath app/windows/runner/wintun.dll
      - run: flutter build windows --debug
        working-directory: app

  check-macos:
    name: macOS Build Check
    runs-on: macos-14
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '${{ env.FLUTTER_VERSION }}', cache: true }
      - run: flutter pub get
        working-directory: app
      - name: Create stub binary
        run: |
          mkdir -p app/assets/cores
          echo "stub" > app/assets/cores/sing-box
      - run: flutter build macos --debug
        working-directory: app

  # Summary gate — branch protection requires this job to pass
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint, test, check-android, check-linux, check-windows, check-macos]
    if: always()
    steps:
      - name: Gate
        run: |
          results="${{ join(needs.*.result, ',') }}"
          if echo "$results" | grep -qE 'failure|cancelled'; then
            echo "One or more checks failed: $results"
            exit 1
          fi
          echo "All checks passed ✓"
