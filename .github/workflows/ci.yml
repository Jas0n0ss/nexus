name: Nexus VPN — CI / Protocol Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 02:00 UTC to catch upstream API changes
    - cron: '0 2 * * *'

env:
  NODE_VERSION: '20'
  SING_BOX_VERSION: '1.9.3'

jobs:
  # ─── 1. Lint & Type Check ─────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src/ --ext .ts,.tsx

  # ─── 2. Unit Tests — Parser ───────────────────────────────────────────────
  test-parser:
    name: Parser Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run parser tests
        run: npm run test -- --testPathPattern=parser

      - name: Run autofix tests
        run: npm run test -- --testPathPattern=autofix

      - name: Run config generator tests
        run: npm run test -- --testPathPattern=generator

  # ─── 3. Protocol Syntax Validation ───────────────────────────────────────
  validate-protocols:
    name: Protocol URI Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Validate vmess:// URIs
        run: node scripts/validate-uris.js --scheme vmess --fixtures test/fixtures/vmess.txt

      - name: Validate vless:// URIs
        run: node scripts/validate-uris.js --scheme vless --fixtures test/fixtures/vless.txt

      - name: Validate trojan:// URIs
        run: node scripts/validate-uris.js --scheme trojan --fixtures test/fixtures/trojan.txt

      - name: Validate ss:// URIs
        run: node scripts/validate-uris.js --scheme ss --fixtures test/fixtures/ss.txt

      - name: Validate hysteria2:// URIs
        run: node scripts/validate-uris.js --scheme hysteria2 --fixtures test/fixtures/hysteria2.txt

      - name: Validate tuic:// URIs
        run: node scripts/validate-uris.js --scheme tuic --fixtures test/fixtures/tuic.txt

      - name: Validate wg:// URIs
        run: node scripts/validate-uris.js --scheme wg --fixtures test/fixtures/wireguard.txt

  # ─── 4. sing-box Config Validation ───────────────────────────────────────
  validate-singbox:
    name: sing-box Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install sing-box
        run: |
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz" \
            -O sing-box.tar.gz
          tar xf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/
          sing-box version

      - run: npm ci

      - name: Generate test configs
        run: node scripts/generate-test-configs.js --output test/generated-configs/

      - name: Validate each generated config
        run: |
          FAIL=0
          for cfg in test/generated-configs/*.json; do
            echo "Validating $cfg ..."
            if ! sing-box check -c "$cfg" 2>&1; then
              echo "❌ FAILED: $cfg"
              FAIL=1
            else
              echo "✅ OK: $cfg"
            fi
          done
          exit $FAIL

  # ─── 5. Simulated Latency Test ────────────────────────────────────────────
  simulate-latency:
    name: Simulated Node Latency Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run mock latency tests
        # Uses TCP-connect timing to test node reachability (no actual proxy needed)
        run: node scripts/latency-test.js --timeout 5000 --nodes test/fixtures/test-nodes.json

      - name: Upload latency report
        uses: actions/upload-artifact@v4
        with:
          name: latency-report
          path: latency-report.json

  # ─── 6. Auto-Fix Validation ───────────────────────────────────────────────
  validate-autofix:
    name: Auto-Fix Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run auto-fix scenarios
        run: |
          node scripts/test-autofix.js --scenario vmess-encryption-auto
          node scripts/test-autofix.js --scenario grpc-alpn-mismatch
          node scripts/test-autofix.js --scenario quic-mux-conflict
          node scripts/test-autofix.js --scenario trojan-sni-missing
          node scripts/test-autofix.js --scenario reality-fingerprint-missing
          node scripts/test-autofix.js --scenario ss-2022-invalid-key

  # ─── 7. Script Source Compatibility ──────────────────────────────────────
  test-script-sources:
    name: Script Source Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Test 233boy/sing-box format
        run: node scripts/test-source.js --source 233boy-singbox --fixture test/fixtures/subs/233boy-singbox.json

      - name: Test 233boy/Xray format
        run: node scripts/test-source.js --source 233boy-xray --fixture test/fixtures/subs/233boy-xray.json

      - name: Test mack-a/v2ray-agent format
        run: node scripts/test-source.js --source mack-a --fixture test/fixtures/subs/mack-a.b64

      - name: Test yonggekkk/sing-box-yg format
        run: node scripts/test-source.js --source yonggekkk --fixture test/fixtures/subs/yonggekkk.json

  # ─── 8. Build (multi-platform) ────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: [lint, test-parser, validate-protocols, validate-singbox]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: macOS
            runner: macos-14
            build_cmd: npm run build:mac
            artifact: dist/Nexus VPN.dmg
          - os: Windows
            runner: windows-latest
            build_cmd: npm run build:win
            artifact: dist/NexusVPN-Setup.exe
          - os: Linux
            runner: ubuntu-latest
            build_cmd: npm run build:linux
            artifact: dist/nexus-vpn.AppImage

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-vpn-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          retention-days: 14

  # ─── 9. UI Smoke Test ────────────────────────────────────────────────────
  ui-test:
    name: UI Smoke Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run UI tests (preview HTML)
        run: npx playwright test tests/ui/

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: test-results/

  # ─── 10. Security Scan ────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
