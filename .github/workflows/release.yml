name: Release — Build & Publish All Platforms

on:
  push:
    tags:
      - 'v*.*.*'           # e.g. v1.0.0 → triggers full release
  workflow_dispatch:       # manual trigger for testing
    inputs:
      version:
        description: 'Version string (e.g. 1.0.0)'
        required: true
        default: '0.0.0-dev'

# ── Shared ─────────────────────────────────────────────────────────────────────
env:
  FLUTTER_VERSION: '3.22.0'
  SING_BOX_VERSION: '1.9.3'
  APP_NAME: 'NexusVPN'
  BUNDLE_ID: 'com.nexusvpn.app'

permissions:
  contents: write   # needed to create releases and upload assets

jobs:

# ══════════════════════════════════════════════════════════════════════════════
# 0. Prepare — extract version, validate tag
# ══════════════════════════════════════════════════════════════════════════════
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      build_number: ${{ steps.ver.outputs.build_number }}
      release_name: ${{ steps.ver.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "release_name=Nexus VPN v${VERSION}" >> $GITHUB_OUTPUT

      - name: Download sing-box binaries (cache key)
        run: echo "sing-box v${{ env.SING_BOX_VERSION }}"

# ══════════════════════════════════════════════════════════════════════════════
# 1. macOS — Flutter Desktop → .app → .dmg
# ══════════════════════════════════════════════════════════════════════════════
  build-macos:
    name: Build macOS (.dmg)
    needs: prepare
    runs-on: macos-14       # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Download sing-box (macOS universal)
        run: |
          mkdir -p app/assets/cores
          # arm64
          curl -fsSL "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-darwin-arm64.tar.gz" | tar xz
          mv "sing-box-${SING_BOX_VERSION}-darwin-arm64/sing-box" /tmp/sb-arm64
          # amd64
          curl -fsSL "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-darwin-amd64.tar.gz" | tar xz
          mv "sing-box-${SING_BOX_VERSION}-darwin-amd64/sing-box" /tmp/sb-amd64
          # Universal binary
          lipo -create -output app/assets/cores/sing-box /tmp/sb-arm64 /tmp/sb-amd64
          chmod +x app/assets/cores/sing-box

      - name: Update version in pubspec.yaml
        working-directory: app
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BUILD="${{ needs.prepare.outputs.build_number }}"
          sed -i '' "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml

      - name: Build macOS app
        working-directory: app
        run: flutter build macos --release

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Package DMG
        run: |
          APP_PATH="app/build/macos/Build/Products/Release/nexus_vpn.app"
          DMG_PATH="NexusVPN-${{ needs.prepare.outputs.version }}-macos.dmg"
          create-dmg \
            --volname "Nexus VPN" \
            --volicon "app/macos/Runner/Assets.xcassets/AppIcon.appiconset/app_icon_512.png" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "nexus_vpn.app" 160 190 \
            --hide-extension "nexus_vpn.app" \
            --app-drop-link 380 190 \
            --no-internet-enable \
            "$DMG_PATH" \
            "$APP_PATH" || true
          # create-dmg exits 2 when no code signing is set — .dmg is still valid
          ls -lh NexusVPN-*.dmg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: NexusVPN-*.dmg
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# 2. Windows — Flutter Desktop → .exe installer (Inno Setup)
# ══════════════════════════════════════════════════════════════════════════════
  build-windows:
    name: Build Windows (.exe)
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Download sing-box (Windows amd64)
        shell: pwsh
        run: |
          $ver = "${{ env.SING_BOX_VERSION }}"
          $url = "https://github.com/SagerNet/sing-box/releases/download/v${ver}/sing-box-${ver}-windows-amd64.zip"
          Invoke-WebRequest $url -OutFile sb-win.zip
          Expand-Archive sb-win.zip -DestinationPath sb-win
          Copy-Item "sb-win/sing-box-${ver}-windows-amd64/sing-box.exe" "app/windows/runner/sing-box.exe"

      - name: Download WinTUN
        shell: pwsh
        run: |
          Invoke-WebRequest https://www.wintun.net/builds/wintun-0.14.1.zip -OutFile wintun.zip
          Expand-Archive wintun.zip -DestinationPath wintun
          Copy-Item "wintun/wintun/bin/amd64/wintun.dll" "app/windows/runner/wintun.dll"

      - name: Update version
        shell: pwsh
        working-directory: app
        run: |
          $ver = "${{ needs.prepare.outputs.version }}"
          $build = "${{ needs.prepare.outputs.build_number }}"
          (Get-Content pubspec.yaml) -replace '^version: .*', "version: ${ver}+${build}" |
            Set-Content pubspec.yaml

      - name: Build Windows app
        working-directory: app
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Create installer
        shell: pwsh
        run: |
          $ver = "${{ needs.prepare.outputs.version }}"
          iscc /DAppVersion=$ver app/windows/installer/nexus-vpn.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: app/windows/installer/Output/NexusVPN-*.exe
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# 3. Linux — Flutter Desktop → .AppImage + .deb
# ══════════════════════════════════════════════════════════════════════════════
  build-linux:
    name: Build Linux (.AppImage + .deb)
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libayatana-appindicator3-dev \
            fuse libfuse2 appstream

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Download sing-box (Linux amd64)
        run: |
          mkdir -p app/assets/cores
          curl -fsSL "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz" | tar xz
          mv "sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box" app/assets/cores/sing-box
          chmod +x app/assets/cores/sing-box

      - name: Update version
        working-directory: app
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BUILD="${{ needs.prepare.outputs.build_number }}"
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml

      - name: Build Linux app
        working-directory: app
        run: flutter build linux --release

      - name: Download appimagetool
        run: |
          curl -fsSL https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool
          chmod +x appimagetool

      - name: Package AppImage
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          # Create AppDir structure
          mkdir -p AppDir/usr/{bin,share/{applications,icons/hicolor/512x512/apps}}
          cp -r app/build/linux/x64/release/bundle/* AppDir/usr/bin/

          cat > AppDir/nexus-vpn.desktop << 'EOF'
          [Desktop Entry]
          Name=Nexus VPN
          Exec=nexus_vpn
          Icon=nexus-vpn
          Type=Application
          Categories=Network;
          EOF

          cp app/assets/icons/app_icon_512.png AppDir/usr/share/icons/hicolor/512x512/apps/nexus-vpn.png
          cp AppDir/nexus-vpn.desktop AppDir/usr/share/applications/
          ln -s usr/bin/nexus_vpn AppDir/AppRun

          ARCH=x86_64 ./appimagetool AppDir "NexusVPN-${VERSION}-linux-x86_64.AppImage"

      - name: Package .deb
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p deb-pkg/DEBIAN deb-pkg/usr/bin deb-pkg/usr/share/applications \
                    deb-pkg/usr/share/icons/hicolor/512x512/apps

          cat > deb-pkg/DEBIAN/control << EOF
          Package: nexus-vpn
          Version: ${VERSION}
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: Nexus VPN <support@nexusvpn.app>
          Description: Cross-platform VPN client
           Supports VLESS/VMess/Trojan/Shadowsocks/Hysteria2/TUIC/WireGuard
          EOF

          cp -r app/build/linux/x64/release/bundle/* deb-pkg/usr/bin/
          cp app/assets/icons/app_icon_512.png deb-pkg/usr/share/icons/hicolor/512x512/apps/nexus-vpn.png

          cat > deb-pkg/usr/share/applications/nexus-vpn.desktop << 'EOF'
          [Desktop Entry]
          Name=Nexus VPN
          Exec=/usr/bin/nexus_vpn
          Icon=nexus-vpn
          Type=Application
          Categories=Network;
          EOF

          dpkg-deb --build deb-pkg "NexusVPN-${VERSION}-linux-amd64.deb"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            NexusVPN-*.AppImage
            NexusVPN-*.deb
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# 4. Android — Flutter → .apk (split ABI) + .aab
# ══════════════════════════════════════════════════════════════════════════════
  build-android:
    name: Build Android (.apk + .aab)
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Download sing-box for Android (all ABIs)
        run: |
          mkdir -p app/android/app/src/main/assets/cores
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            URL="https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-android-${ABI}.tar.gz"
            curl -fsSL "$URL" | tar xz
            mv "sing-box-${SING_BOX_VERSION}-android-${ABI}/sing-box" \
               "app/android/app/src/main/assets/cores/sing-box-${ABI}"
          done

      - name: Update version
        working-directory: app
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BUILD="${{ needs.prepare.outputs.build_number }}"
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml

      - name: Decode keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/android/keystore.jks
          cat > app/android/key.properties << EOF
          storePassword=${{ secrets.ANDROID_STORE_PASS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASS }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      - name: Build APKs (split ABI)
        working-directory: app
        run: flutter build apk --release --split-per-abi

      - name: Build AAB
        working-directory: app
        run: flutter build appbundle --release

      - name: Rename artifacts
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cd app/build/app/outputs
          for f in flutter-apk/app-*-release.apk; do
            ABI=$(echo "$f" | grep -oP '(?<=app-)[\w-]+(?=-release)')
            cp "$f" "NexusVPN-${VERSION}-android-${ABI}.apk"
          done
          cp bundle/release/app-release.aab "NexusVPN-${VERSION}-android.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-packages
          path: |
            app/build/app/outputs/NexusVPN-*.apk
            app/build/app/outputs/NexusVPN-*.aab
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# 5. iOS — Flutter → .ipa (unsigned for open-source; signed via secrets)
# ══════════════════════════════════════════════════════════════════════════════
  build-ios:
    name: Build iOS (.ipa)
    needs: prepare
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Download sing-box for iOS
        run: |
          mkdir -p app/ios/NexusVPNExtension
          curl -fsSL "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-ios.tar.gz" | tar xz || \
          curl -fsSL "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-darwin-arm64.tar.gz" | tar xz
          find . -name "sing-box" -not -path "*/assets/*" | head -1 | xargs -I{} cp {} app/ios/NexusVPNExtension/sing-box
          chmod +x app/ios/NexusVPNExtension/sing-box 2>/dev/null || true

      - name: Update version
        working-directory: app
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          BUILD="${{ needs.prepare.outputs.build_number }}"
          sed -i '' "s/^version: .*/version: ${VERSION}+${BUILD}/" pubspec.yaml

      - name: Import certificates (signed build)
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASS: ${{ secrets.IOS_CERTIFICATE_PASS }}
          IOS_PROVISION_BASE64: ${{ secrets.IOS_PROVISION_BASE64 }}
        run: |
          echo "$IOS_CERTIFICATE_BASE64" | base64 -d > /tmp/cert.p12
          echo "$IOS_PROVISION_BASE64"   | base64 -d > /tmp/profile.mobileprovision
          security create-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$IOS_CERTIFICATE_PASS" -T /usr/bin/codesign
          security set-keychain-settings -lut 21600 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS (unsigned)
        working-directory: app
        run: |
          flutter build ios --release --no-codesign
          # Package unsigned IPA
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r "NexusVPN-${{ needs.prepare.outputs.version }}-ios-unsigned.ipa" Payload/

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: app/NexusVPN-*.ipa
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# 6. Create GitHub Release + upload all assets
# ══════════════════════════════════════════════════════════════════════════════
  release:
    name: Create GitHub Release
    needs: [prepare, build-macos, build-windows, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    if: always() && needs.prepare.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: List artifacts
        run: find release-assets -type f | sort

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^v${VERSION}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges | head -30)
          else
            COMMITS="- Initial release"
          fi
          {
            echo "changelog<<EOF"
            echo "## 更新日志"
            echo ""
            echo "$COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.prepare.outputs.release_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, '-') }}
          body: |
            # Nexus VPN ${{ needs.prepare.outputs.version }}

            > 跨平台 VPN 客户端 — 支持 VLESS+REALITY · VMess · Trojan · Shadowsocks · Hysteria2 · TUIC · WireGuard

            ## 📦 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | 🍎 macOS (Apple Silicon + Intel) | `NexusVPN-*-macos.dmg` | 拖入 Applications 安装 |
            | 🪟 Windows (x64) | `NexusVPN-*-windows-setup.exe` | 安装向导，自动配置 WinTUN |
            | 🐧 Linux (x64) | `NexusVPN-*.AppImage` / `.deb` | AppImage 直接运行，deb 系 `dpkg -i` |
            | 🤖 Android | `NexusVPN-*-android-arm64-v8a.apk` | 主流设备推荐 |
            | 🍏 iOS | `NexusVPN-*-ios-unsigned.ipa` | 需要 AltStore / Sideloadly 安装 |

            ## ⚠️ 注意事项

            - **macOS**: 首次运行需在「系统设置 → 隐私与安全性」允许运行
            - **Windows**: 需要管理员权限（WinTUN 驱动）
            - **iOS**: 未签名 IPA 需通过 AltStore/TrollStore 安装，或从 TestFlight 获取
            - **Android**: 安装前在设置中启用「未知来源」

            ## 核心版本
            - sing-box: v${{ env.SING_BOX_VERSION }}
            - Flutter: v${{ env.FLUTTER_VERSION }}

            ${{ steps.changelog.outputs.changelog }}

            ---
            *Build: ${{ needs.prepare.outputs.build_number }} · Commit: ${{ github.sha }}*
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.apk
            release-assets/**/*.aab
            release-assets/**/*.ipa
          token: ${{ secrets.GITHUB_TOKEN }}

# ══════════════════════════════════════════════════════════════════════════════
# 7. Post-release: update Homebrew tap (macOS) & winget manifest (Windows)
# ══════════════════════════════════════════════════════════════════════════════
  update-pkg-managers:
    name: Update Package Managers
    needs: [prepare, release]
    runs-on: ubuntu-latest
    if: needs.release.result == 'success' && !contains(needs.prepare.outputs.version, '-')
    steps:
      - name: Compute DMG SHA256
        id: sha
        run: |
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/v${{ needs.prepare.outputs.version }}/NexusVPN-${{ needs.prepare.outputs.version }}-macos.dmg" \
            -o nexus.dmg
          echo "sha256=$(sha256sum nexus.dmg | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Dispatch Homebrew tap update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_REPO_TOKEN }}
          repository: yourorg/homebrew-nexusvpn
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ needs.prepare.outputs.version }}",
              "sha256": "${{ steps.sha.outputs.sha256 }}"
            }
        continue-on-error: true

      - name: Dispatch winget manifest update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.WINGET_REPO_TOKEN }}
          repository: yourorg/winget-pkgs-fork
          event-type: update-manifest
          client-payload: |
            {
              "version": "${{ needs.prepare.outputs.version }}"
            }
        continue-on-error: true
