name: nexus_vpn
description: Nexus VPN — Cross-platform VPN client supporting VLESS/VMess/Trojan/Shadowsocks/Hysteria2/TUIC/WireGuard
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2
  riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3
  http: ^1.2.1

  # Charts
  fl_chart: ^0.68.0

  # UI
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  lucide_icons: ^0.0.7
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.6

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Platform / System
  path_provider: ^2.1.3
  process_run: ^0.14.2   # spawn sing-box/xray process
  permission_handler: ^11.3.1

  # QR Code
  mobile_scanner: ^5.1.1  # scan QR (mobile)
  qr_flutter: ^4.1.0

  # File picker
  file_picker: ^8.0.3

  # Clipboard
  flutter_clipboard_manager: ^1.0.1
  pasteboard: ^0.2.0

  # URL launcher
  url_launcher: ^6.3.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Tray (desktop)
  system_tray: ^2.0.3

  # Window management (desktop)
  window_manager: ^0.3.9

  # JSON
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/geoip/
    - assets/cores/      # bundled sing-box binary
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
