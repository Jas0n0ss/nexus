name: nexus
description: Nexus — cross-platform proxy client (sing-box) with multi-node failover
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

# Only packages actually imported by lib/ are declared here.
# Add new dependencies as features require them.
dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Networking
  http: ^1.2.1

  # Config formats
  yaml: ^3.1.2

  # Charts
  fl_chart: ^0.68.0

  # UI
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1

  # Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Platform / System
  path_provider: ^2.1.3

  # File picker
  file_picker: ^8.0.3

  # Window management (desktop)
  window_manager: ^0.3.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/geoip/
    - assets/cores/      # bundled sing-box binary
  # Custom fonts can be added here once font files are present in assets/fonts/
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
